changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🆕 新機能
      labels:
        - enhancement
        - feature
    - title: 🐛 バグ修正
      labels:
        - bug
        - fix
    - title: 🔧 改善・変更
      labels:
        - improvement
        - refactor
    - title: 📄 ドキュメント
      labels:
        - documentation
    - title: ⬆️ 依存パッケージ更新
      labels:
        - dependencies
    - title: その他の変更
      labels:
        - '*'
